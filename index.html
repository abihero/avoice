<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Call</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    :root {
      --bg-color: #000000;
      --surface-color: #1c1c1e;
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --btn-bg: rgba(40, 40, 40, 0.8);
      --primary-red: #FF3B30;
      --primary-green: #34C759;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #F2F2F7;
        --surface-color: #FFFFFF;
        --text-primary: #000000;
        --text-secondary: rgba(0, 0, 0, 0.5);
        --btn-bg: rgba(230, 230, 230, 0.8);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s;
    }

    #proximityOverlay {
      position: fixed; inset: 0; background: #000; z-index: 9999;
      display: none;
    }

    .call-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 60px 24px calc(40px + env(safe-area-inset-bottom));
    }

    .header { text-align: center; }
    .status-label { font-size: 17px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
    .caller-name { font-size: 34px; font-weight: 600; letter-spacing: -0.5px; }

    .avatar-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
    }
    .avatar-circle {
      width: 160px; height: 160px; border-radius: 50%;
      background: var(--btn-bg); overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.6s;
    }
    .avatar-circle.calling {
      transform: scale(1.08);
      box-shadow: 0 10px 50px rgba(52, 199, 89, 0.2);
    }
    .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
    }

    .icon-btn {
      width: 68px; height: 68px; border-radius: 50%;
      background: var(--btn-bg); border: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-primary); cursor: pointer;
      transition: 0.2s;
    }
    .icon-btn svg { width: 28px; height: 28px; fill: none; stroke: currentColor; stroke-width: 2; }
    .icon-btn.active { background: var(--text-primary); color: var(--bg-color); }
    .icon-btn:active { transform: scale(0.9); }

    .action-btn {
      width: 76px; height: 76px; border-radius: 50%;
      border: none; display: flex; align-items: center; justify-content: center;
      grid-column: 2; margin: 0 auto; cursor: pointer;
      transition: 0.2s;
    }
    .action-btn:active { transform: scale(0.9); }
    .action-btn svg { width: 30px; height: 30px; }
    .btn-start { background: var(--primary-green); color: white; }
    .btn-end { background: var(--primary-red); color: white; display: none; }

    /* Error toast */
    #errorToast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-120px);
      background: var(--primary-red); color: white;
      padding: 12px 24px; border-radius: 14px; font-size: 14px; font-weight: 600;
      z-index: 10000; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap; max-width: 90vw; text-align: center;
    }
    #errorToast.show { transform: translateX(-50%) translateY(0); }

    /* Settings Panel */
    #settingsPanel {
      position: fixed; inset: 0; background: var(--bg-color); z-index: 1000;
      padding: 60px 24px; display: none; flex-direction: column; gap: 24px;
    }
    .setting-item { display: flex; flex-direction: column; gap: 8px; }
    .setting-item label { font-size: 13px; text-transform: uppercase; color: var(--text-secondary); font-weight: 700; }
    input {
      background: var(--btn-bg); border: none; padding: 16px;
      border-radius: 14px; color: var(--text-primary); font-size: 17px;
      outline: none;
    }
    .save-btn {
      background: var(--primary-green); color: white; border: none;
      padding: 16px; border-radius: 14px; font-weight: 600; font-size: 17px; margin-top: auto;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="errorToast"></div>
  <div id="proximityOverlay"></div>

  <div id="settingsPanel">
    <h1 style="font-size: 28px; margin-bottom: 10px;">Pengaturan</h1>
    <div class="setting-item">
      <label>Nama AI</label>
      <input type="text" id="inputName" placeholder="Contoh: Vira">
    </div>
    <div class="setting-item">
      <label>Peran / Sifat AI</label>
      <input type="text" id="inputRole" placeholder="Contoh: Pacar yang manja">
    </div>
    <button class="save-btn" onclick="closeSettings()">Simpan & Tutup</button>
  </div>

  <div class="call-container">
    <div class="header">
      <div class="status-label" id="statusLabel">Siap</div>
      <div class="caller-name" id="displayName" onclick="openSettings()">Vira</div>
    </div>

    <div class="avatar-area">
      <div class="avatar-circle" id="avatarCircle">
        <img src="https://i.pravatar.cc/300?img=44" alt="avatar">
      </div>
    </div>

    <div class="controls-grid">
      <button class="icon-btn" id="muteBtn" onclick="this.classList.toggle('active')">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
      </button>

      <button class="icon-btn" onclick="openSettings()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>

      <button class="icon-btn" id="speakerBtn" onclick="toggleSpeaker()">
        <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </button>

      <button class="action-btn btn-start" id="startBtn" onclick="startCall()">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M6.62 10.79a15.15 15.15 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      </button>

      <button class="action-btn btn-end" id="endBtn" onclick="endCall()">
        <svg viewBox="0 0 24 24" fill="currentColor" stroke="none" style="transform: rotate(135deg);"><path d="M6.62 10.79a15.15 15.15 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    const RAILWAY_URL = "https://avoice-production.up.railway.app";

    // Volume levels: earpiece = very quiet, speaker = full
    const VOL_EARPIECE = 0.05;
    const VOL_SPEAKER = 1.0;

    let socket = null;
    let recognition = null;
    let timerInterval = null;
    let seconds = 0;
    let isSpeakerOn = false;
    let isCallActive = false;

    let settings = JSON.parse(localStorage.getItem('call_app_settings')) || { name: 'Vira', role: 'Asisten ramah' };

    // --- Error toast (hanya untuk error) ---
    let toastTimer = null;
    function showError(msg) {
      const t = document.getElementById('errorToast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
    }

    // --- Proximity Sensor ---
    if ('ProximitySensor' in window) {
      try {
        const sensor = new ProximitySensor();
        sensor.onreading = () => {
          document.getElementById('proximityOverlay').style.display = sensor.near ? 'block' : 'none';
        };
        sensor.start();
      } catch(e) {}
    }

    window.addEventListener('deviceorientation', (event) => {
      if (isCallActive && Math.abs(event.beta) > 75) {
        document.getElementById('proximityOverlay').style.display = 'block';
      } else {
        document.getElementById('proximityOverlay').style.display = 'none';
      }
    });

    // --- Init UI ---
    window.onload = () => {
      document.getElementById('displayName').innerText = settings.name;
      document.getElementById('inputName').value = settings.name;
      document.getElementById('inputRole').value = settings.role;
    };

    function openSettings() {
      if (isCallActive) return; // jangan buka settings saat call
      document.getElementById('settingsPanel').style.display = 'flex';
    }

    function closeSettings() {
      const nameVal = document.getElementById('inputName').value.trim();
      const roleVal = document.getElementById('inputRole').value.trim();
      if (!nameVal) { showError('Nama tidak boleh kosong'); return; }
      settings.name = nameVal;
      settings.role = roleVal || 'Asisten ramah';
      localStorage.setItem('call_app_settings', JSON.stringify(settings));
      document.getElementById('displayName').innerText = settings.name;
      document.getElementById('settingsPanel').style.display = 'none';
    }

    // --- Speaker toggle: mengubah volume aktual ---
    function toggleSpeaker() {
      isSpeakerOn = !isSpeakerOn;
      document.getElementById('speakerBtn').classList.toggle('active', isSpeakerOn);

      // Jika sedang ada ucapan yang sedang diputar, ubah volumenya langsung
      const synth = window.speechSynthesis;
      if (synth.speaking) {
        synth.cancel(); // batalkan yang lama
        // tidak bisa mengubah volume mid-speech di semua browser,
        // jadi efeknya apply di ucapan berikutnya
      }
    }

    function getVolume() {
      return isSpeakerOn ? VOL_SPEAKER : VOL_EARPIECE;
    }

    // --- Start Call ---
    function startCall() {
      if (isCallActive) return;

      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('endBtn').style.display = 'flex';
      document.getElementById('statusLabel').innerText = "Menghubungkan...";
      document.getElementById('avatarCircle').classList.add('calling');
      isCallActive = true;

      initAI();
    }

    function initAI() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        showError('Browser ini tidak mendukung pengenalan suara');
        endCall();
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.lang = 'id-ID';

      let wsConnected = false;

      try {
        socket = new WebSocket(RAILWAY_URL.replace(/^http/, 'ws'));
      } catch(e) {
        showError('Gagal membuat koneksi');
        endCall();
        return;
      }

      // Timeout koneksi
      const connectTimeout = setTimeout(() => {
        if (!wsConnected) {
          showError('Tidak dapat terhubung ke server');
          endCall();
        }
      }, 15000);

      socket.onopen = () => {
        wsConnected = true;
        clearTimeout(connectTimeout);
        seconds = 0;
        startTimer();
        try { recognition.start(); } catch(e) {}
      };

      socket.onerror = () => {
        clearTimeout(connectTimeout);
        showError('Koneksi terputus');
        endCall();
      };

      socket.onclose = () => {
        if (isCallActive) endCall();
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'text') {
            // Hentikan dengar sementara saat AI bicara
            try { recognition.abort(); } catch(e) {}

            speakText(data.content);
          }
        } catch(e) {}
      };

      recognition.onerror = (e) => {
        // error "no-speech" atau "aborted" wajar, tidak perlu ditampilkan
        if (e.error !== 'no-speech' && e.error !== 'aborted') {
          showError('Mikrofon error: ' + e.error);
        }
      };

      recognition.onend = () => {
        // Auto-restart jika call masih aktif dan AI tidak sedang bicara
        if (isCallActive && !window.speechSynthesis.speaking) {
          setTimeout(() => {
            if (isCallActive) {
              try { recognition.start(); } catch(e) {}
            }
          }, 300);
        }
      };

      recognition.onresult = (e) => {
        // Abaikan jika sedang muted
        if (document.getElementById('muteBtn').classList.contains('active')) return;

        const text = e.results[e.results.length - 1][0].transcript;
        if (socket && socket.readyState === WebSocket.OPEN) {
          socket.send(JSON.stringify({
            text: text,
            name: settings.name,
            role: settings.role
          }));
        }
      };
    }

    function speakText(text) {
      const ut = new SpeechSynthesisUtterance(text);
      ut.lang = 'id-ID';
      ut.volume = getVolume();
      ut.rate = 1.0;
      ut.pitch = 1.0;

      ut.onend = () => {
        // Setelah AI selesai bicara, lanjut dengar lagi
        setTimeout(() => {
          if (isCallActive) {
            try { recognition.start(); } catch(e) {}
          }
        }, 500);
      };

      ut.onerror = () => {
        // Jika error saat bicara, tetap lanjut dengar
        setTimeout(() => {
          if (isCallActive) {
            try { recognition.start(); } catch(e) {}
          }
        }, 500);
      };

      window.speechSynthesis.speak(ut);
    }

    // --- End Call: hentikan semua, bersih, tanpa alert ---
    function endCall() {
      isCallActive = false;

      // Tutup socket
      if (socket) {
        try { socket.close(); } catch(e) {}
        socket = null;
      }

      // Hentikan speech recognition
      if (recognition) {
        try { recognition.abort(); } catch(e) {}
        recognition = null;
      }

      // Hentikan speech synthesis
      window.speechSynthesis.cancel();

      // Hentikan timer
      clearInterval(timerInterval);
      timerInterval = null;

      // Reset UI
      document.getElementById('startBtn').style.display = 'flex';
      document.getElementById('endBtn').style.display = 'none';
      document.getElementById('statusLabel').innerText = "Siap";
      document.getElementById('avatarCircle').classList.remove('calling');

      // Reset speaker ke earpiece
      isSpeakerOn = false;
      document.getElementById('speakerBtn').classList.remove('active');

      // Reset mute
      document.getElementById('muteBtn').classList.remove('active');

      // Pastikan proximity overlay tertutup
      document.getElementById('proximityOverlay').style.display = 'none';
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        document.getElementById('statusLabel').innerText = m + ':' + s;
      }, 1000);
    }
  </script>
</body>
</html>
